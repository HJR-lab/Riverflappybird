<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #4ec0ca;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}
canvas {
  border-radius: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  cursor: pointer;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// Pixel art rendering: draw on small offscreen canvas, scale up
const canvas = document.getElementById('game');
const displayCtx = canvas.getContext('2d');
const PW = 200; // pixel world width
const PH = 300; // pixel world height
const SCALE = 2;
canvas.width = PW * SCALE;
canvas.height = PH * SCALE;
displayCtx.imageSmoothingEnabled = false;

const offscreen = document.createElement('canvas');
offscreen.width = PW;
offscreen.height = PH;
const ctx = offscreen.getContext('2d');

const W = PW;
const H = PH;

let bird, pipes, score, bestScore, gameState, frameCount, groundX, scoreFlash;
const GRAVITY = 0.25;
const JUMP = -4.2;
const PIPE_SPEED = 1.3;
const PIPE_GAP = 75;
const PIPE_WIDTH = 30;
const PIPE_SPACING = 110;
const GROUND_H = 40;
const BIRD_SIZE = 10;
bestScore = parseInt(localStorage.getItem('flappyBest') || '0');

// Seeded random for consistent background elements
function seededRandom(seed) {
  let s = seed;
  return function() { s = (s * 16807 + 0) % 2147483647; return s / 2147483647; };
}
const bgRand = seededRandom(42);

// Pre-generate background elements
const stars = [];
for (let i = 0; i < 25; i++) {
  stars.push({ x: bgRand() * W, y: bgRand() * (H * 0.3), size: bgRand() > 0.7 ? 2 : 1, twinkle: bgRand() * Math.PI * 2 });
}

const buildings = [];
for (let i = 0; i < 14; i++) {
  const bw = 12 + Math.floor(bgRand() * 14);
  const bh = 25 + Math.floor(bgRand() * 50);
  buildings.push({
    x: i * 30 - 10 + Math.floor(bgRand() * 10),
    w: bw, h: bh,
    color: bgRand() > 0.5 ? '#3a6b5e' : '#2d5a4e',
    windows: Math.floor(bgRand() * 4) + 1,
    windowRows: Math.floor(bh / 10)
  });
}

const bushes = [];
for (let i = 0; i < 10; i++) {
  bushes.push({
    x: i * 45 + Math.floor(bgRand() * 20),
    w: 14 + Math.floor(bgRand() * 12),
    h: 6 + Math.floor(bgRand() * 6),
    color: bgRand() > 0.5 ? '#4a8c3f' : '#3d7a34'
  });
}

const hills = [
  { x: 20, w: 80, h: 30, color: '#5aad50' },
  { x: 120, w: 60, h: 22, color: '#4d9e44' },
  { x: 60, w: 100, h: 25, color: '#52a548' },
  { x: 170, w: 70, h: 28, color: '#5aad50' }
];

function px(x, y, w, h) {
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w) || 1, Math.floor(h) || 1);
}

function init() {
  bird = { x: 40, y: H / 2, vy: 0, rotation: 0, flapFrame: 0 };
  pipes = [];
  score = 0;
  frameCount = 0;
  groundX = 0;
  scoreFlash = 0;
  gameState = 'ready';
}
function spawnPipe(x) {
  const minY = 40;
  const maxY = H - GROUND_H - PIPE_GAP - 40;
  const topH = minY + Math.random() * (maxY - minY);
  pipes.push({ x, topH, scored: false });
}
function jump() {
  if (gameState === 'ready') {
    gameState = 'playing';
    bird.vy = JUMP;
    bird.flapFrame = 8;
  } else if (gameState === 'playing') {
    bird.vy = JUMP;
    bird.flapFrame = 8;
  } else if (gameState === 'dead' && frameCount > 30) {
    init();
  }
}
document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });

function update() {
  frameCount++;
  if (gameState === 'ready') {
    bird.y = H / 2 + Math.sin(frameCount * 0.08) * 5;
    groundX = (groundX - 0.5) % 12;
    return;
  }
  if (gameState === 'dead') {
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.rotation = Math.min(bird.rotation + 5, 90);
    if (bird.y + BIRD_SIZE > H - GROUND_H) {
      bird.y = H - GROUND_H - BIRD_SIZE;
      bird.vy = 0;
    }
    return;
  }
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rotation = Math.min(bird.vy * 3, 80);
  if (bird.flapFrame > 0) bird.flapFrame--;
  groundX = (groundX - PIPE_SPEED) % 12;
  if (pipes.length === 0 || pipes[pipes.length - 1].x < W - PIPE_SPACING) {
    spawnPipe(pipes.length === 0 ? W + 50 : pipes[pipes.length - 1].x + PIPE_SPACING);
  }
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED;
    if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
      p.scored = true;
      score++;
      scoreFlash = 10;
    }
    if (p.x + PIPE_WIDTH < -10) pipes.splice(i, 1);
  }
  const bx = bird.x, by = bird.y;
  const brx = BIRD_SIZE * 0.75;
  const bry = BIRD_SIZE * 0.6;
  if (by + bry > H - GROUND_H || by - bry < 0) { die(); return; }
  for (const p of pipes) {
    if (bx + brx > p.x && bx - brx < p.x + PIPE_WIDTH) {
      if (by - bry < p.topH || by + bry > p.topH + PIPE_GAP) { die(); return; }
    }
  }
}
function die() {
  gameState = 'dead';
  frameCount = 0;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('flappyBest', bestScore);
  }
}

function drawSky() {
  // Sky gradient done pixel-style with bands
  const groundTop = H - GROUND_H;
  const colors = ['#4ec0ca','#5ac8d0','#6ed4d8','#87dede','#a0e8e4','#bee8d8','#d4edcc','#e8f5e9'];
  const bandH = Math.ceil(groundTop / colors.length);
  for (let i = 0; i < colors.length; i++) {
    ctx.fillStyle = colors[i];
    ctx.fillRect(0, i * bandH, W, bandH + 1);
  }
}

function drawStars() {
  for (const s of stars) {
    const bright = Math.sin(frameCount * 0.05 + s.twinkle) > 0.3;
    ctx.fillStyle = bright ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.3)';
    px(s.x, s.y, s.size, s.size);
  }
}

function drawSun() {
  const sx = W - 35, sy = 25;
  // Sun body
  ctx.fillStyle = '#fff4a3';
  px(sx - 6, sy - 2, 12, 4);
  px(sx - 4, sy - 4, 8, 8);
  px(sx - 2, sy - 6, 4, 12);
  // Sun rays
  ctx.fillStyle = '#ffe066';
  px(sx - 1, sy - 8, 2, 2);
  px(sx - 1, sy + 6, 2, 2);
  px(sx - 8, sy - 1, 2, 2);
  px(sx + 6, sy - 1, 2, 2);
  px(sx + 5, sy - 5, 2, 2);
  px(sx - 7, sy - 5, 2, 2);
  px(sx + 5, sy + 3, 2, 2);
  px(sx - 7, sy + 3, 2, 2);
}

function drawHills() {
  const offset = (frameCount * 0.2) % W;
  const groundTop = H - GROUND_H;
  for (const h of hills) {
    ctx.fillStyle = h.color;
    const cx = ((h.x - offset) % (W + h.w) + W + h.w) % (W + h.w) - h.w / 2;
    // Pixel-art hill: stacked rectangles
    for (let row = 0; row < h.h; row++) {
      const ratio = row / h.h;
      const rowW = h.w * (1 - ratio * ratio);
      px(cx + (h.w - rowW) / 2, groundTop - row, rowW, 1);
    }
  }
}

function drawCityscape() {
  const offset = (frameCount * 0.3) % (W + 100);
  const groundTop = H - GROUND_H;
  for (const b of buildings) {
    const bx = ((b.x - offset) % (W + 60) + W + 60) % (W + 60) - 30;
    ctx.fillStyle = b.color;
    px(bx, groundTop - b.h, b.w, b.h);
    // Dark roof edge
    ctx.fillStyle = '#1d3a30';
    px(bx, groundTop - b.h, b.w, 1);
    px(bx, groundTop - b.h, 1, b.h);
    px(bx + b.w - 1, groundTop - b.h, 1, b.h);
    // Windows
    ctx.fillStyle = '#ffe082';
    const winW = 2, winH = 2, winGap = 4;
    const cols = Math.min(b.windows, Math.floor((b.w - 4) / winGap));
    const rows = b.windowRows;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const lit = ((b.x * 7 + r * 3 + c * 11) % 5) > 1;
        ctx.fillStyle = lit ? '#ffe082' : '#2a5548';
        px(bx + 3 + c * winGap, groundTop - b.h + 4 + r * (winH + 3), winW, winH);
      }
    }
  }
}

function drawBushes() {
  const offset = (frameCount * 0.6) % (W + 80);
  const groundTop = H - GROUND_H;
  for (const b of bushes) {
    const bx = ((b.x - offset) % (W + 80) + W + 80) % (W + 80) - 40;
    ctx.fillStyle = b.color;
    // Pixel bush shape
    px(bx + 2, groundTop - b.h, b.w - 4, b.h);
    px(bx, groundTop - b.h + 2, b.w, b.h - 2);
    px(bx + 1, groundTop - b.h + 1, b.w - 2, b.h - 1);
    // Highlight
    ctx.fillStyle = '#6bc45e';
    px(bx + 3, groundTop - b.h + 1, b.w - 8, 1);
  }
}

function drawClouds() {
  const offset = (frameCount * 0.15) % (W + 120);
  const clouds = [[30, 30, 24], [130, 20, 18], [80, 50, 20], [200, 35, 16]];
  for (const [cx, cy, s] of clouds) {
    const x = ((cx - offset) % (W + 120) + W + 120) % (W + 120) - 60;
    ctx.fillStyle = '#fff';
    // Pixel cloud
    px(x, cy, s, 4);
    px(x + 2, cy - 3, s - 4, 3);
    px(x + s * 0.3, cy - 5, s * 0.4, 2);
    px(x - 2, cy + 2, s + 4, 2);
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    px(x - 1, cy + 4, s + 2, 2);
  }
}

function drawPipe(p) {
  const capH = 8;
  const capExtra = 3;
  const groundTop = H - GROUND_H;

  // Top pipe body
  ctx.fillStyle = '#5cb85c';
  px(p.x + 1, 0, PIPE_WIDTH - 2, p.topH - capH);
  // Pipe highlight
  ctx.fillStyle = '#73d673';
  px(p.x + 3, 0, 4, p.topH - capH);
  // Pipe shadow
  ctx.fillStyle = '#3d8b3d';
  px(p.x + PIPE_WIDTH - 5, 0, 3, p.topH - capH);
  // Top pipe cap
  ctx.fillStyle = '#5cb85c';
  px(p.x - capExtra, p.topH - capH, PIPE_WIDTH + capExtra * 2, capH);
  ctx.fillStyle = '#73d673';
  px(p.x - capExtra + 2, p.topH - capH, 4, capH);
  // Cap outline
  ctx.fillStyle = '#2d6b2d';
  px(p.x - capExtra, p.topH - capH, PIPE_WIDTH + capExtra * 2, 1);
  px(p.x - capExtra, p.topH - 1, PIPE_WIDTH + capExtra * 2, 1);
  px(p.x - capExtra, p.topH - capH, 1, capH);
  px(p.x + PIPE_WIDTH + capExtra - 1, p.topH - capH, 1, capH);

  // Bottom pipe
  const bTop = p.topH + PIPE_GAP;
  ctx.fillStyle = '#5cb85c';
  px(p.x + 1, bTop + capH, PIPE_WIDTH - 2, groundTop - bTop - capH);
  ctx.fillStyle = '#73d673';
  px(p.x + 3, bTop + capH, 4, groundTop - bTop - capH);
  ctx.fillStyle = '#3d8b3d';
  px(p.x + PIPE_WIDTH - 5, bTop + capH, 3, groundTop - bTop - capH);
  // Bottom pipe cap
  ctx.fillStyle = '#5cb85c';
  px(p.x - capExtra, bTop, PIPE_WIDTH + capExtra * 2, capH);
  ctx.fillStyle = '#73d673';
  px(p.x - capExtra + 2, bTop, 4, capH);
  // Cap outline
  ctx.fillStyle = '#2d6b2d';
  px(p.x - capExtra, bTop, PIPE_WIDTH + capExtra * 2, 1);
  px(p.x - capExtra, bTop + capH - 1, PIPE_WIDTH + capExtra * 2, 1);
  px(p.x - capExtra, bTop, 1, capH);
  px(p.x + PIPE_WIDTH + capExtra - 1, bTop, 1, capH);
}

// Bird drawn on displayCtx at full resolution for crisp visibility
function drawBird() {
  const dc = displayCtx;
  dc.save();
  dc.translate(Math.floor(bird.x * SCALE), Math.floor(bird.y * SCALE));
  const rot = bird.rotation * Math.PI / 180;
  dc.rotate(rot);
  const S = BIRD_SIZE * SCALE;
  const wingY = bird.flapFrame > 0 ? -8 : (Math.sin(frameCount * 0.15) > 0 ? 4 : 0);

  function bpx(x, y, w, h) {
    dc.fillRect(Math.floor(x), Math.floor(y), Math.floor(w) || 1, Math.floor(h) || 1);
  }

  // Dark outline
  dc.fillStyle = '#543847';
  bpx(-S - 2, -S * 0.7 - 2, S * 2 + 4, S * 1.4 + 4);

  // Body - orange
  dc.fillStyle = '#f5a623';
  bpx(-S, -S * 0.7, S * 2, S * 1.4);

  // Yellow top
  dc.fillStyle = '#f7c948';
  bpx(-S + 2, -S * 0.7, S * 2 - 4, S * 0.7);

  // Red chest stripe
  dc.fillStyle = '#e84430';
  bpx(-S + 4, S * 0.2, S * 1.6, 6);
  // Darker red edge
  dc.fillStyle = '#c43020';
  bpx(-S + 4, S * 0.2 + 6, S * 1.6, 2);

  // Wing - white
  dc.fillStyle = '#fff';
  bpx(-S + 2, wingY - 4, 16, 10);
  // Wing outline
  dc.fillStyle = '#543847';
  bpx(-S + 2, wingY - 6, 16, 2);
  bpx(-S + 2, wingY + 6, 16, 2);
  bpx(-S, wingY - 4, 2, 10);
  bpx(-S + 18, wingY - 4, 2, 10);

  // Eye white - large
  dc.fillStyle = '#fff';
  bpx(S * 0.2, -S * 0.6, 14, 14);
  // Eye outline
  dc.fillStyle = '#543847';
  bpx(S * 0.2, -S * 0.6 - 2, 14, 2);
  bpx(S * 0.2, -S * 0.6 + 14, 14, 2);
  bpx(S * 0.2 - 2, -S * 0.6, 2, 14);
  bpx(S * 0.2 + 14, -S * 0.6, 2, 14);

  // Pupil
  dc.fillStyle = '#111';
  bpx(S * 0.2 + 8, -S * 0.6 + 4, 6, 6);

  // Pupil highlight
  dc.fillStyle = '#fff';
  bpx(S * 0.2 + 10, -S * 0.6 + 4, 2, 2);

  // Beak - orange
  dc.fillStyle = '#f5a623';
  bpx(S + 2, -4, 12, 8);
  // Beak outline
  dc.fillStyle = '#543847';
  bpx(S + 2, -6, 12, 2);
  bpx(S + 2, 4, 12, 2);
  bpx(S + 14, -4, 2, 8);
  // Beak line
  dc.fillStyle = '#c43020';
  bpx(S + 2, 0, 12, 2);

  dc.restore();
}

function drawGround() {
  const groundTop = H - GROUND_H;
  // Green top strip
  ctx.fillStyle = '#5cb85c';
  ctx.fillRect(0, groundTop, W, 4);
  // Darker green edge
  ctx.fillStyle = '#4a9e4a';
  ctx.fillRect(0, groundTop + 4, W, 2);
  // Light green grass highlights
  ctx.fillStyle = '#6ed66e';
  for (let x = Math.floor(groundX) % 6; x < W; x += 6) {
    px(x, groundTop, 3, 2);
  }
  // Sandy ground
  ctx.fillStyle = '#d4a653';
  ctx.fillRect(0, groundTop + 6, W, GROUND_H - 6);
  // Dirt pattern
  ctx.fillStyle = '#c49640';
  for (let x = Math.floor(groundX) % 12; x < W + 12; x += 12) {
    px(x, groundTop + 10, 6, 2);
    px(x + 6, groundTop + 18, 6, 2);
    px(x + 3, groundTop + 26, 4, 2);
  }
  // Dark dirt spots
  ctx.fillStyle = '#b08530';
  for (let x = Math.floor(groundX) % 18; x < W + 18; x += 18) {
    px(x + 2, groundTop + 14, 3, 2);
    px(x + 10, groundTop + 22, 2, 2);
  }
  // Pebbles
  ctx.fillStyle = '#bfa050';
  for (let x = Math.floor(groundX) % 24; x < W + 24; x += 24) {
    px(x + 5, groundTop + 30, 2, 1);
    px(x + 15, groundTop + 34, 1, 1);
  }
}

// All text drawing uses displayCtx (full resolution) for crisp readability
function drawScore() {
  if (scoreFlash > 0) scoreFlash--;
  const dc = displayCtx;
  const scale = 1 + scoreFlash * 0.02;
  dc.save();
  dc.translate(W * SCALE / 2, 60);
  dc.scale(scale, scale);
  dc.fillStyle = scoreFlash > 0 ? '#ffe082' : '#fff';
  dc.strokeStyle = '#333';
  dc.lineWidth = 5;
  dc.font = 'bold 52px "Segoe UI", system-ui, sans-serif';
  dc.textAlign = 'center';
  dc.strokeText(score, 0, 0);
  dc.fillText(score, 0, 0);
  dc.restore();
}
function drawReady() {
  const dc = displayCtx;
  const cx = W * SCALE / 2;
  const cy = H * SCALE / 2;
  dc.fillStyle = '#fff';
  dc.strokeStyle = '#333';
  dc.lineWidth = 4;
  dc.font = 'bold 40px "Segoe UI", system-ui, sans-serif';
  dc.textAlign = 'center';
  dc.strokeText('Flappy Bird', cx, cy - 80);
  dc.fillText('Flappy Bird', cx, cy - 80);
  dc.font = 'bold 22px "Segoe UI", system-ui, sans-serif';
  dc.lineWidth = 3;
  dc.strokeText('Tap, Click or Space', cx, cy + 60);
  dc.fillText('Tap, Click or Space', cx, cy + 60);
  if (bestScore > 0) {
    dc.font = '18px "Segoe UI", system-ui, sans-serif';
    dc.fillStyle = '#ffe082';
    dc.lineWidth = 3;
    dc.strokeText('Best: ' + bestScore, cx, cy + 90);
    dc.fillText('Best: ' + bestScore, cx, cy + 90);
  }
}
function drawGameOver() {
  const dc = displayCtx;
  const cx = W * SCALE / 2;
  const cy = H * SCALE / 2;
  dc.fillStyle = 'rgba(0,0,0,0.35)';
  dc.fillRect(0, 0, W * SCALE, H * SCALE);
  const pw = 280, ph = 200;
  const ppx = (W * SCALE - pw) / 2, py = cy - ph / 2 - 20;
  // Panel
  dc.fillStyle = '#dec076';
  dc.strokeStyle = '#8b6914';
  dc.lineWidth = 4;
  dc.beginPath();
  dc.roundRect(ppx, py, pw, ph, 10);
  dc.fill();
  dc.stroke();

  dc.fillStyle = '#fff';
  dc.strokeStyle = '#333';
  dc.lineWidth = 4;
  dc.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
  dc.textAlign = 'center';
  dc.strokeText('Game Over', cx, py + 50);
  dc.fillText('Game Over', cx, py + 50);
  dc.font = '24px "Segoe UI", system-ui, sans-serif';
  dc.fillStyle = '#333';
  dc.fillText('Score: ' + score, cx, py + 95);
  dc.fillStyle = '#8b6914';
  dc.fillText('Best: ' + bestScore, cx, py + 130);
  dc.font = '18px "Segoe UI", system-ui, sans-serif';
  dc.fillStyle = '#555';
  dc.fillText('Tap to restart', cx, py + 170);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawStars();
  drawSun();
  drawClouds();
  drawHills();
  drawCityscape();
  drawBushes();
  pipes.forEach(drawPipe);
  drawGround();

  // Scale pixel art up to display canvas
  displayCtx.clearRect(0, 0, canvas.width, canvas.height);
  displayCtx.drawImage(offscreen, 0, 0, canvas.width, canvas.height);

  // Draw bird and text AFTER upscale so they're crisp at full resolution
  drawBird();
  if (gameState === 'playing' || gameState === 'dead') drawScore();
  if (gameState === 'ready') drawReady();
  if (gameState === 'dead') drawGameOver();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
init();
loop();
</script>
</body>
</html>
