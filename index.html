<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #4ec0ca;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
}
canvas {
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  cursor: pointer;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 400;
const H = 600;
canvas.width = W;
canvas.height = H;
let bird, pipes, score, bestScore, gameState, frameCount, groundX, scoreFlash;
const GRAVITY = 0.45;
const JUMP = -7.5;
const PIPE_SPEED = 2.5;
const PIPE_GAP = 150;
const PIPE_WIDTH = 60;
const PIPE_SPACING = 220;
const GROUND_H = 80;
const BIRD_SIZE = 20;
bestScore = parseInt(localStorage.getItem('flappyBest') || '0');
function init() {
  bird = { x: 80, y: H / 2, vy: 0, rotation: 0, flapFrame: 0 };
  pipes = [];
  score = 0;
  frameCount = 0;
  groundX = 0;
  scoreFlash = 0;
  gameState = 'ready';
}
function spawnPipe(x) {
  const minY = 80;
  const maxY = H - GROUND_H - PIPE_GAP - 80;
  const topH = minY + Math.random() * (maxY - minY);
  pipes.push({ x, topH, scored: false });
}
function jump() {
  if (gameState === 'ready') {
    gameState = 'playing';
    bird.vy = JUMP;
    bird.flapFrame = 8;
  } else if (gameState === 'playing') {
    bird.vy = JUMP;
    bird.flapFrame = 8;
  } else if (gameState === 'dead' && frameCount > 30) {
    init();
  }
}
document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, { passive: false });
function update() {
  frameCount++;
  if (gameState === 'ready') {
    bird.y = H / 2 + Math.sin(frameCount * 0.08) * 10;
    groundX = (groundX - 1) % 24;
    return;
  }
  if (gameState === 'dead') {
    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.rotation = Math.min(bird.rotation + 5, 90);
    if (bird.y + BIRD_SIZE > H - GROUND_H) {
      bird.y = H - GROUND_H - BIRD_SIZE;
      bird.vy = 0;
    }
    return;
  }
  bird.vy += GRAVITY;
  bird.y += bird.vy;
  bird.rotation = Math.min(bird.vy * 3, 80);
  if (bird.flapFrame > 0) bird.flapFrame--;
  groundX = (groundX - PIPE_SPEED) % 24;
  if (pipes.length === 0 || pipes[pipes.length - 1].x < W - PIPE_SPACING) {
    spawnPipe(pipes.length === 0 ? W + 100 : pipes[pipes.length - 1].x + PIPE_SPACING);
  }
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED;
    if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
      p.scored = true;
      score++;
      scoreFlash = 10;
    }
    if (p.x + PIPE_WIDTH < -10) pipes.splice(i, 1);
  }
  const bx = bird.x, by = bird.y;
  const brx = BIRD_SIZE * 0.75;
  const bry = BIRD_SIZE * 0.6;
  if (by + bry > H - GROUND_H || by - bry < 0) { die(); return; }
  for (const p of pipes) {
    if (bx + brx > p.x && bx - brx < p.x + PIPE_WIDTH) {
      if (by - bry < p.topH || by + bry > p.topH + PIPE_GAP) { die(); return; }
    }
  }
}
function die() {
  gameState = 'dead';
  frameCount = 0;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('flappyBest', bestScore);
  }
}
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
  grad.addColorStop(0, '#4ec0ca');
  grad.addColorStop(1, '#e8f5e9');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H - GROUND_H);
}
function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const offset = (frameCount * 0.3) % (W + 200);
  [[100, 80, 60], [280, 50, 45], [180, 130, 50]].forEach(([bx, by, s]) => {
    const cx = (bx - offset + W + 200) % (W + 200) - 100;
    ctx.beginPath();
    ctx.arc(cx, by, s * 0.5, 0, Math.PI * 2);
    ctx.arc(cx - s * 0.3, by + 5, s * 0.35, 0, Math.PI * 2);
    ctx.arc(cx + s * 0.35, by + 3, s * 0.4, 0, Math.PI * 2);
    ctx.fill();
  });
}
function drawPipe(p) {
  const capH = 26;
  const capExtra = 6;
  const tGrad = ctx.createLinearGradient(p.x - capExtra, 0, p.x + PIPE_WIDTH + capExtra, 0);
  tGrad.addColorStop(0, '#5cb85c');
  tGrad.addColorStop(0.3, '#73d673');
  tGrad.addColorStop(0.7, '#73d673');
  tGrad.addColorStop(1, '#3d8b3d');
  ctx.fillStyle = tGrad;
  ctx.fillRect(p.x, 0, PIPE_WIDTH, p.topH);
  ctx.fillStyle = tGrad;
  ctx.fillRect(p.x - capExtra, p.topH - capH, PIPE_WIDTH + capExtra * 2, capH);
  ctx.strokeStyle = '#2d6b2d';
  ctx.lineWidth = 2;
  ctx.strokeRect(p.x - capExtra, p.topH - capH, PIPE_WIDTH + capExtra * 2, capH);
  const bTop = p.topH + PIPE_GAP;
  ctx.fillStyle = tGrad;
  ctx.fillRect(p.x, bTop, PIPE_WIDTH, H - GROUND_H - bTop);
  ctx.fillRect(p.x - capExtra, bTop, PIPE_WIDTH + capExtra * 2, capH);
  ctx.strokeRect(p.x - capExtra, bTop, PIPE_WIDTH + capExtra * 2, capH);
}
function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);
  ctx.rotate((bird.rotation * Math.PI) / 180);
  const S = BIRD_SIZE;
  const wingY = bird.flapFrame > 0 ? -7 : Math.sin(frameCount * 0.15) * 3;
  // Dark outline body
  ctx.fillStyle = '#543847';
  ctx.beginPath();
  ctx.ellipse(0, 0, S + 3, S * 0.85 + 3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Main body - orange/yellow
  ctx.fillStyle = '#f5a623';
  ctx.beginPath();
  ctx.ellipse(0, 0, S, S * 0.85, 0, 0, Math.PI * 2);
  ctx.fill();
  // Lighter yellow belly/top
  ctx.fillStyle = '#f7c948';
  ctx.beginPath();
  ctx.ellipse(-2, -4, S * 0.65, S * 0.5, 0, 0, Math.PI * 2);
  ctx.fill();
  // Red/orange chest stripe
  ctx.fillStyle = '#e84430';
  ctx.beginPath();
  ctx.ellipse(4, 4, S * 0.75, S * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();
  // Dark outline for stripe
  ctx.strokeStyle = '#543847';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(4, 4, S * 0.75, S * 0.3, 0, 0, Math.PI * 2);
  ctx.stroke();
  // Wing - white with dark outline
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#543847';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(-6, wingY, 9, 6, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // Eye white - large
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(10, -5, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#543847';
  ctx.lineWidth = 2;
  ctx.stroke();
  // Pupil
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(13, -5, 4, 0, Math.PI * 2);
  ctx.fill();
  // Pupil highlight
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(14, -7, 1.5, 0, Math.PI * 2);
  ctx.fill();
  // Beak - orange
  ctx.fillStyle = '#f5a623';
  ctx.strokeStyle = '#543847';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(16, -1);
  ctx.lineTo(28, 2);
  ctx.lineTo(16, 5);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}
function drawGround() {
  ctx.fillStyle = '#d4a653';
  ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
  ctx.fillStyle = '#5cb85c';
  ctx.fillRect(0, H - GROUND_H, W, 15);
  ctx.fillStyle = '#c49640';
  for (let x = groundX; x < W + 24; x += 24) {
    ctx.fillRect(x, H - GROUND_H + 20, 12, 4);
    ctx.fillRect(x + 12, H - GROUND_H + 30, 12, 4);
  }
}
function drawScore() {
  if (scoreFlash > 0) scoreFlash--;
  const scale = 1 + scoreFlash * 0.02;
  ctx.save();
  ctx.translate(W / 2, 65);
  ctx.scale(scale, scale);
  ctx.fillStyle = scoreFlash > 0 ? '#ffe082' : '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 4;
  ctx.font = 'bold 48px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeText(score, 0, 0);
  ctx.fillText(score, 0, 0);
  ctx.restore();
}
function drawReady() {
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.font = 'bold 36px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeText('Flappy Bird', W / 2, H / 2 - 80);
  ctx.fillText('Flappy Bird', W / 2, H / 2 - 80);
  ctx.font = 'bold 20px "Segoe UI", system-ui, sans-serif';
  ctx.lineWidth = 2;
  ctx.strokeText('Tap, Click or Press Space', W / 2, H / 2 + 60);
  ctx.fillText('Tap, Click or Press Space', W / 2, H / 2 + 60);
  if (bestScore > 0) {
    ctx.font = '16px "Segoe UI", system-ui, sans-serif';
    ctx.fillStyle = '#ffe082';
    ctx.strokeText('Best: ' + bestScore, W / 2, H / 2 + 90);
    ctx.fillText('Best: ' + bestScore, W / 2, H / 2 + 90);
  }
}
function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillRect(0, 0, W, H);
  const pw = 260, ph = 180;
  const px = (W - pw) / 2, py = (H - ph) / 2 - 20;
  ctx.fillStyle = '#dec076';
  ctx.strokeStyle = '#8b6914';
  ctx.lineWidth = 3;
  roundRect(px, py, pw, ph, 12);
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.font = 'bold 32px "Segoe UI", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.strokeText('Game Over', W / 2, py + 45);
  ctx.fillText('Game Over', W / 2, py + 45);
  ctx.font = '22px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#333';
  ctx.fillText('Score: ' + score, W / 2, py + 85);
  ctx.fillStyle = '#8b6914';
  ctx.fillText('Best: ' + bestScore, W / 2, py + 115);
  ctx.font = '16px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle = '#555';
  ctx.fillText('Tap to restart', W / 2, py + 155);
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}
function draw() {
  drawSky();
  drawClouds();
  pipes.forEach(drawPipe);
  drawGround();
  drawBird();
  if (gameState === 'playing' || gameState === 'dead') drawScore();
  if (gameState === 'ready') drawReady();
  if (gameState === 'dead') drawGameOver();
}
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
init();
loop();
</script>
</body>
</html>
